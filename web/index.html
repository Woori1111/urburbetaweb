<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="동아리 전용 모바일 웹 커뮤니티">
  <meta name="theme-color" content="#FFB300">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="우리동아리">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>우리동아리</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background-color: #faf9f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    #loading img {
      width: 240px;
      max-width: 80vw;
      height: auto;
      object-fit: contain;
    }
    #loading .text {
      margin-top: 24px;
      font-size: 16px;
      color: #6b5d52;
      min-height: 1.5em;
    }
    #loading .text::after { content: attr(data-dots); }
  </style>
</head>
<body>
  <div id="loading">
    <img src="images/urbur_logo.png" alt="urbur" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span style="display:none; font-size: 48px; color: #9e8f84;">◆</span>
    <div class="text" id="loading-text" data-dots=".">로딩중</div>
  </div>
  <script>
    (function() {
      var dots = 1;
      var el = document.getElementById('loading-text');
      setInterval(function() {
        dots = (dots % 3) + 1;
        el.setAttribute('data-dots', '.'.repeat(dots));
      }, 400);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
